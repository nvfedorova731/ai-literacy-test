<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Literacy Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f6f6f3] text-[#1738aa]">

<div class="max-w-4xl mx-auto p-6">

  <h1 class="text-4xl mb-6">AI Literacy Test</h1>

  <div id="test"></div>

  <button onclick="submitTest()" class="mt-6 px-6 py-3 bg-[#1132a8] text-white">
    Show results
  </button>

  <div id="results" class="mt-10 hidden"></div>

</div>

<script>

const questions = [
  { text: "Knowledge representation plays a crucial role in machine learning by creating feature representations from raw data.", correct: true },
  { text: "Computers can only reason and make decisions in a way that is identical to how humans do.", correct: false },
  { text: "Biased data perpetuates social stereotypes.", correct: true },
  { text: "Data is subject to interpretation.", correct: true },
  { text: "Human intelligence is the only form of intelligence that can be considered true intelligence.", correct: false },
  { text: "Artificial intelligence can be programmed to perform a wide range of tasks with precision and consistency, surpassing the specific abilities of children's intelligence.", correct: true },
  { text: "The role of humans in AI development is mainly limited to monitoring already deployed systems.", correct: false },
  { text: "AI is effective at solving problems that involve human emotions.", correct: false },
  { text: "Modern AI systems can form complex associations in the same way humans do.", correct: false },
  { text: "Some data used in AI reflects specific cultural contexts and can influence model outcomes.", correct: true }
];

const container = document.getElementById("test");

questions.forEach((q, i) => {
  const div = document.createElement("div");
  div.className = "mb-6";

  div.innerHTML = `
    <div class="mb-2 font-medium">Question ${i+1}</div>
    <div class="mb-3">${q.text}</div>
    <div>
      ${[1,2,3,4,5].map(v => `
        <label class="mr-4">
          <input type="radio" name="q${i}" value="${v}"> ${v}
        </label>
      `).join("")}
    </div>
  `;

  container.appendChild(div);
});

function submitTest() {
  let score = 0;

  questions.forEach((q, i) => {
    const val = document.querySelector(`input[name="q${i}"]:checked`);
    if (!val) return;

    let v = Number(val.value);
    score += q.correct ? v : (6 - v);
  });

  const max = questions.length * 5;
  const percent = Math.round(score / max * 100);

  let interpretation =
    percent >= 80 ? "High AI Literacy" :
    percent >= 60 ? "Above average" :
    percent >= 40 ? "Moderate level" :
    percent >= 20 ? "Below average" :
    "Low AI Literacy";

  const results = document.getElementById("results");
  results.classList.remove("hidden");

  results.innerHTML = `
    <div class="grid md:grid-cols-3 gap-6">

      <div class="bg-[#1132a8] text-white p-6 rounded-2xl">
        <div class="text-sm">Score</div>
        <div class="text-4xl">${score}/${max}</div>
      </div>

      <div class="bg-white p-6 rounded-2xl border">
        <div class="text-sm">Normalized</div>
        <div class="text-4xl">${percent}%</div>
      </div>

      <div class="p-6 rounded-2xl text-[#1738aa]"
        style="background: linear-gradient(135deg,#f7e7a9,#e6c35c,#d4a93a,#b88a1e);">

        <div class="text-sm tracking-wide uppercase">Interpretation</div>
        <div class="text-2xl mt-2">${interpretation}</div>

      </div>

    </div>
  `;
}

</script>

</body>
</html>
