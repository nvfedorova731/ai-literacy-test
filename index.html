<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Literacy Test</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f6f6f3;
  color: #1738aa;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 40px 20px;
}

h1 {
  font-size: 48px;
  font-weight: 300;
}

.card {
  background: white;
  padding: 20px;
  margin-top: 20px;
  border-radius: 20px;
  border: 1px solid rgba(23,56,170,0.1);
}

.answers button {
  margin: 5px;
  padding: 10px 15px;
  border: 1px solid #ccc;
  background: #fff;
  cursor: pointer;
}

.answers button.active {
  background: #1132a8;
  color: white;
}

button.main {
  margin-top: 20px;
  padding: 15px 20px;
  background: #1132a8;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <p>Made by Natalia Fedorova</p>

  <h1>Test your AI Literacy</h1>
  <p>Short version of SAIL4ALL test</p>

  <div id="questions"></div>

  <button class="main" onclick="calculate()">Show result</button>

  <h2 id="result"></h2>

  <button onclick="share()">Share</button>
  <button onclick="shareLinkedIn()">Share on LinkedIn</button>

  <p>
    Follow me:
    <a href="https://www.linkedin.com/in/natalia-fedorova-ai/" target="_blank">
      LinkedIn
    </a>
  </p>
</div>

<script>
const questions = [
  { text: "AI uses algorithms to learn from data.", correct: true },
  { text: "AI is a single technology.", correct: false }
];

let answers = {};

function render() {
  const container = document.getElementById("questions");

  questions.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <p>${q.text}</p>
      <div class="answers">
        ${[1,2,3,4,5].map(v => `
          <button onclick="select(${i}, ${v}, this)">
            ${v}
          </button>
        `).join("")}
      </div>
    `;

    container.appendChild(div);
  });
}

function select(i, value, btn) {
  answers[i] = value;

  const buttons = btn.parentNode.querySelectorAll("button");
  buttons.forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function calculate() {
  let score = 0;

  questions.forEach((q, i) => {
    const v = answers[i];
    if (!v) return;

    score += q.correct ? v : (6 - v);
  });

  document.getElementById("result").innerText =
    "Your score: " + score;
}

function share() {
  const text = "I tested my AI Literacy!";
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function shareLinkedIn() {
  const url = encodeURIComponent(window.location.href);
  window.open(
    `https://www.linkedin.com/sharing/share-offsite/?url=${url}`
  );
}

render();
</script>

</body>
</html>
